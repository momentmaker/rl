let stars = [];
let bgStars = [];
let hoveredStar = null;
let time = 0;
let mouseX = 0, mouseY = 0;

function init() {
  const n = DATA.length;
  const cx = W / 2, cy = H / 2;
  const maxR = Math.min(W, H) * 0.36;
  
  stars = DATA.map((t, i) => {
    const angle = i * 2.3999;
    const r = maxR * (0.25 + 0.75 * (i / n));
    return {
      title: t.t,
      date: t.d,
      tags: t.tag ? t.tag.split(',') : [],
      x: cx + Math.cos(angle) * r + (Math.random() - 0.5) * 15,
      y: cy + Math.sin(angle) * r + (Math.random() - 0.5) * 15,
      baseRadius: 2.5 + ((i * 7) % 4),
      pulse: (i * 2.094) % (Math.PI * 2),
      href: '/' + t.d.replace(/\//g, '/') + '/'
    };
  });

  bgStars = [];
  for (let i = 0; i < 350; i++) {
    bgStars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: 0.2 + Math.random() * 0.8,
      b: 0.2 + Math.random() * 0.5
    });
  }
}

function draw() {
  time += 0.003;
  
  ctx.clearRect(0, 0, W, H);

  const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W, H) * 0.6);
  grad.addColorStop(0, '#1a1410');
  grad.addColorStop(0.5, '#0e0b09');
  grad.addColorStop(1, '#060403');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  for (const s of bgStars) {
    const tw = 0.5 + 0.5 * Math.sin(time * 2 + s.x * 0.01 + s.y * 0.01);
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r * tw, 0, Math.PI * 2);
    ctx.fillStyle = ;
    ctx.fill();
  }

  for (let i = 0; i < stars.length; i++) {
    for (let j = i + 1; j < stars.length; j++) {
      const shared = stars[i].tags.filter(t => stars[j].tags.includes(t));
      if (shared.length === 0) continue;
      const dx = stars[i].x - stars[j].x;
      const dy = stars[i].y - stars[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > 280) continue;
      const alpha = Math.min(0.2, shared.length * 0.05);
      ctx.strokeStyle = ;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(stars[i].x, stars[i].y);
      ctx.lineTo(stars[j].x, stars[j].y);
      ctx.stroke();
    }
  }

  for (const star of stars) {
    const glow = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(time * 2 + star.pulse));
    const r = star.baseRadius * (0.8 + 0.4 * glow);
    
    const grd = ctx.createRadialGradient(star.x, star.y, 0, star.x, star.y, r * 5);
    grd.addColorStop(0, );
    grd.addColorStop(1, 'rgba(244, 199, 154, 0)');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(star.x, star.y, r * 5, 0, Math.PI * 2);
    ctx.fill();

    ctx.beginPath();
    ctx.arc(star.x, star.y, r, 0, Math.PI * 2);
    ctx.fillStyle = ;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(star.x, star.y, r * 0.35, 0, Math.PI * 2);
    ctx.fillStyle = '#f4c79a';
    ctx.fill();
  }

  requestAnimationFrame(draw);
}

canvas.addEventListener('mousemove', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  
  let found = null;
  for (const star of stars) {
    const dx = mouseX - star.x;
    const dy = mouseY - star.y;
    if (dx * dx + dy * dy < 324) {
      found = star;
      break;
    }
  }

  if (found !== hoveredStar) {
    hoveredStar = found;
    info.style.opacity = found ? '0' : '1';
    if (found) {
      tooltip.innerHTML =         '<div class="tt-title">✦ ' + found.title + '</div>' +         '<div class="tt-date">' + found.date + '</div>' +         (found.tags.length ? '<div class="tt-tags">' + found.tags.map(t => '<span class="tt-tag">' + t + '</span>').join('') + '</div>' : '');
      tooltip.classList.add('visible');
    } else {
      tooltip.classList.remove('visible');
    }
  }

  if (found) {
    tooltip.style.left = Math.min(e.clientX + 20, W - 340) + 'px';
    tooltip.style.top = Math.max(24, e.clientY - 10) + 'px';
    canvas.style.cursor = 'pointer';
  } else {
    canvas.style.cursor = 'default';
  }
});

canvas.addEventListener('click', () => {
  if (hoveredStar) window.open('/' + hoveredStar.date.replace(/-/g, '/') + '/#' + hoveredStar.title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/-$/, ''), '_blank');
});

init();
draw();
</script>
</body>
</html>
