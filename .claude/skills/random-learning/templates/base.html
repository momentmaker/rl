<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>{% block title %}{{ page.title or site.title }}{% endblock %}</title>
<meta name="description" content="{{ page.description or site.description }}">
{% if site.tags %}<meta name="keywords" content="{{ site.tags[:18] | map(attribute='name') | join(', ') }}">{% endif %}
<link rel="canonical" href="{{ page.canonical or site.url }}">
<meta name="robots" content="index, follow">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#faf7f1" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#14120e" media="(prefers-color-scheme: dark)">

<meta property="og:type" content="{{ page.og_type or 'website' }}">
<meta property="og:site_name" content="{{ site.title }}">
<meta property="og:title" content="{{ page.title or site.title }}">
<meta property="og:description" content="{{ page.description or site.description }}">
<meta property="og:url" content="{{ page.canonical or site.url }}">
<meta property="og:image" content="{{ page.og_image or site.og_image }}">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ page.title or site.title }}">
<meta name="twitter:description" content="{{ page.description or site.description }}">
<meta name="twitter:image" content="{{ page.og_image or site.og_image }}">

<link rel="icon" href="{{ site.base_url }}/favicon.svg" type="image/svg+xml">
<link rel="icon" href="{{ site.base_url }}/favicon-32.png" sizes="32x32" type="image/png">
<link rel="apple-touch-icon" href="{{ site.base_url }}/apple-touch-icon.png">
<link rel="mask-icon" href="{{ site.base_url }}/favicon.svg" color="#b4541f">
<link rel="manifest" href="{{ site.base_url }}/manifest.webmanifest">
<link rel="alternate" type="application/atom+xml" href="{{ site.feed_url }}" title="{{ site.title }}">

{% block structured_data %}
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"WebSite","name":{{ site.title | tojson }},
 "url":{{ site.url | tojson }},"description":{{ site.description | tojson }}}
</script>
{% endblock %}

<style>
  :root {
    --paper:#faf7f1; --ink:#211d18; --muted:#6f6657; --faint:#8f8472;
    --line:#e7e0d4; --line-soft:#efe9dd; --card:#fffdf9;
    --accent:#b4541f; --accent-ink:#8f3f15; --accent-soft:#f4e7d8;
    --shadow:0 1px 2px rgba(40,30,15,.04), 0 8px 30px rgba(40,30,15,.05);
    --serif:"Iowan Old Style","Charter","Palatino Linotype",Palatino,"Book Antiqua",Georgia,Cambria,serif;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:"SF Mono",ui-monospace,"JetBrains Mono",Menlo,Consolas,monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --paper:#14120e; --ink:#ece4d6; --muted:#9a8f7d; --faint:#7d7361;
      --line:#2c281f; --line-soft:#221f18; --card:#1b1813;
      --accent:#e0915a; --accent-ink:#eaa570; --accent-soft:#241d14;
      --shadow:0 1px 2px rgba(0,0,0,.25), 0 10px 34px rgba(0,0,0,.30);
    }
  }
  * { box-sizing:border-box; }
  html { -webkit-text-size-adjust:100%; scroll-behavior:smooth; }
  body {
    margin:0; background:var(--paper); color:var(--ink);
    font:400 1.18rem/1.75 var(--serif);
    font-feature-settings:"kern","liga","onum","pnum";
    text-rendering:optimizeLegibility; -webkit-font-smoothing:antialiased;
  }
  .wrap { max-width:42rem; margin:0 auto; padding:2.2rem 1.3rem 5rem; }
  @media (min-width:48rem){ .wrap{ padding-top:3rem; } }

  a { color:var(--accent-ink); text-underline-offset:.18em;
      text-decoration-color:color-mix(in srgb, var(--accent) 35%, transparent);
      transition:text-decoration-color .15s ease, color .15s ease; }
  a:hover { text-decoration-color:var(--accent); }

  /* masthead */
  .masthead { display:flex; align-items:center; justify-content:space-between;
              gap:1rem; padding-bottom:1.5rem; margin-bottom:2.2rem;
              border-bottom:1px solid var(--line); }
  .brand { display:inline-flex; align-items:center; gap:.6rem; text-decoration:none;
           color:var(--ink); font-family:var(--sans); font-weight:650;
           letter-spacing:-.01em; font-size:1.02rem; }
  .brand:hover { color:var(--ink); }
  .brand .dawn { width:1.45rem; height:1.45rem; flex:0 0 auto; }
  .nav { display:flex; gap:1.15rem; font-family:var(--sans); font-size:.82rem;
         font-weight:550; letter-spacing:.02em; text-transform:uppercase; }
  .nav a { color:var(--muted); text-decoration:none; }
  .nav a:hover { color:var(--accent-ink); }

  h1,h2,h3 { letter-spacing:-.018em; line-height:1.18; font-weight:600; }
  h1 { font-size:clamp(2rem,5.5vw,2.7rem); margin:.2rem 0 .4rem; }
  h2 { font-size:1.5rem; margin:0 0 .2rem; }
  h3 { font-size:1.16rem; }
  p { margin:0 0 1.05rem; }
  .lede { font-size:1.16rem; color:var(--muted); font-style:italic; margin-bottom:0; }
  .kicker { font-family:var(--sans); font-size:.76rem; font-weight:650;
            letter-spacing:.14em; text-transform:uppercase; color:var(--accent-ink); }
  .muted { color:var(--muted); }
  .sans { font-family:var(--sans); }

  hr { border:0; border-top:1px solid var(--line); margin:2.4rem 0; }

  /* stats */
  .stats { display:flex; flex-wrap:wrap; gap:1.6rem 2.4rem; margin:2rem 0 .5rem;
           padding:1.3rem 0; border-top:1px solid var(--line); border-bottom:1px solid var(--line); }
  .stat .n { font-size:1.9rem; font-weight:600; letter-spacing:-.02em; line-height:1; }
  .stat .l { font-family:var(--sans); font-size:.72rem; font-weight:600; letter-spacing:.1em;
             text-transform:uppercase; color:var(--faint); margin-top:.4rem; }

  /* archive timeline */
  .month { font-family:var(--sans); font-size:.78rem; font-weight:650; letter-spacing:.12em;
           text-transform:uppercase; color:var(--faint); margin:2.4rem 0 .8rem; }
  .entry { display:block; text-decoration:none; color:inherit; padding:1rem 0;
           border-top:1px solid var(--line-soft); }
  .entry:hover .entry-title { color:var(--accent-ink); }
  .entry-date { font-family:var(--sans); font-size:.78rem; color:var(--faint); letter-spacing:.02em; }
  .entry-title { font-size:1.18rem; margin:.15rem 0 .1rem; }
  .entry-topics { color:var(--muted); font-size:1rem; }

  /* hero / latest */
  .hero { margin:1.4rem 0 1rem; }
  .hero .topics-peek { color:var(--muted); }

  /* topic article */
  .topic { margin:2.6rem 0; padding-top:2.2rem; border-top:1px solid var(--line); }
  .topic:first-of-type { border-top:0; padding-top:.4rem; }
  .topic-head { display:flex; align-items:baseline; justify-content:space-between; gap:1rem; }
  .topic h2 a.anchor { color:var(--ink); text-decoration:none; }
  .topic h2 a.anchor:hover::after { content:" #"; color:var(--accent); }
  .readtime { font-family:var(--sans); font-size:.74rem; color:var(--faint);
              white-space:nowrap; letter-spacing:.03em; flex:0 0 auto; }
  .topic p:first-of-type strong:first-child { color:var(--ink); }

  /* badge */
  .badge { display:inline-flex; align-items:center; gap:.45rem; font-family:var(--mono);
           font-size:.72rem; color:var(--accent-ink); background:var(--accent-soft);
           border:1px solid color-mix(in srgb,var(--accent) 22%,transparent);
           padding:.2rem .55rem; border-radius:999px; margin:.3rem 0 1.1rem; letter-spacing:0; }
  .badge .dot { width:.42rem; height:.42rem; border-radius:50%; background:var(--accent); }

  /* tag chips */
  .tags { display:flex; flex-wrap:wrap; gap:.4rem; margin:.2rem 0 0; }
  .chip { font-family:var(--sans); font-size:.76rem; font-weight:520; color:var(--muted);
          background:var(--card); border:1px solid var(--line); border-radius:999px;
          padding:.18rem .6rem; text-decoration:none; transition:all .14s ease; }
  .chip:hover { color:var(--accent-ink); border-color:color-mix(in srgb,var(--accent) 45%,transparent);
                background:var(--accent-soft); }
  .chip .c { color:var(--faint); font-variant-numeric:tabular-nums; }

  /* source provenance card */
  .sources { margin:1.6rem 0 .4rem; background:var(--card); border:1px solid var(--line);
             border-radius:.7rem; padding:.9rem 1rem; box-shadow:var(--shadow); }
  .sources-head { font-family:var(--mono); font-size:.78rem; color:var(--ink); margin-bottom:.55rem; }
  .sources-list { display:flex; flex-wrap:wrap; gap:.4rem .5rem; }
  .src { font-family:var(--mono); font-size:.72rem; color:var(--muted);
         background:var(--paper); border:1px solid var(--line-soft); border-radius:.4rem;
         padding:.16rem .5rem; }

  /* connections */
  .connections { font-family:var(--sans); font-size:.9rem; color:var(--muted);
                 margin-top:1.3rem; padding-left:1rem; border-left:2px solid var(--accent-soft); }
  .connections b { color:var(--faint); font-weight:600; letter-spacing:.04em;
                   text-transform:uppercase; font-size:.74rem; }

  /* provenance */
  .provenance { font-family:var(--sans); font-size:.92rem; color:var(--muted);
                margin-top:3rem; padding-top:1.4rem; border-top:1px dashed var(--line);
                background:var(--accent-soft); border-radius:.7rem; padding:1.3rem 1.4rem; }
  .provenance h1,.provenance h2 { font-family:var(--sans); font-size:.78rem; letter-spacing:.1em;
        text-transform:uppercase; color:var(--accent-ink); margin:1.2rem 0 .4rem; }
  .provenance h1:first-child { margin-top:0; }
  .provenance ul { margin:.3rem 0 .8rem; padding-left:1.1rem; }

  /* tag cloud */
  .cloud { display:flex; flex-wrap:wrap; gap:.5rem; margin:1.4rem 0; }

  /* constellation / atlas */
  .atlas { margin:2rem -1.3rem; }
  @media (min-width:48rem){ .atlas { margin:2rem 0; } }
  .atlas-svg { width:100%; height:auto; display:block; border-radius:16px; box-shadow:var(--shadow); }
  .atlas-svg a text { transition:fill .15s ease; }
  .atlas-svg a:hover text { fill:#f4c79a; }
  .atlas-svg a:hover circle:last-of-type { filter:brightness(1.25); }

  footer.site { margin-top:4rem; padding-top:1.4rem; border-top:1px solid var(--line);
                font-family:var(--sans); font-size:.84rem; color:var(--faint); }
  footer.site a { color:var(--muted); }
  footer.site .gh { display:inline-flex; vertical-align:-.22em; }
  footer.site .gh:hover { color:var(--accent-ink); }

  .backlink { font-family:var(--sans); font-size:.82rem; color:var(--muted);
              text-decoration:none; display:inline-block; margin-bottom:1.2rem; }
  .backlink:hover { color:var(--accent-ink); }

  @media (prefers-reduced-motion: no-preference) {
    main > * { animation:rise .5s cubic-bezier(.2,.7,.2,1) both; }
    @keyframes rise { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="masthead">
    <a class="brand" href="{{ site.base_url }}/">
      <svg class="dawn" viewBox="0 0 32 32" fill="none" aria-hidden="true">
        <circle cx="16" cy="16" r="6.2" fill="var(--accent)"/>
        <g stroke="var(--accent)" stroke-width="1.7" stroke-linecap="round">
          <path d="M16 3.2v3.2M16 25.6v3.2M3.2 16h3.2M25.6 16h3.2M6.9 6.9l2.3 2.3M22.8 22.8l2.3 2.3M25.1 6.9l-2.3 2.3M9.2 22.8l-2.3 2.3"/>
        </g>
      </svg>
      <span>{{ site.title }}</span>
    </a>
    <nav class="nav">
      <a href="{{ site.base_url }}/">Journal</a>
      {% if site.tags %}<a href="{{ site.base_url }}/tags/">Topics</a>{% endif %}
      {% if site.stats.topics %}<a href="{{ site.base_url }}/atlas/">Atlas</a>{% endif %}
      <a href="{{ site.feed_url }}">Feed</a>
    </nav>
  </header>
  <main>{% block content %}{% endblock %}</main>
  <footer class="site">
    {{ site.tagline }} Never the same topic twice.
    · <a href="{{ site.feed_url }}">subscribe</a>
    · <a class="gh" href="{{ site.repo_url }}" aria-label="Source on GitHub" title="Source on GitHub">
        <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.65 7.65 0 0 1 2-.27c.68 0 1.36.09 2 .27 1.53-1.03 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
      </a>
  </footer>
</div>
</body>
</html>
