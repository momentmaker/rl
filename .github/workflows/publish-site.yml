name: Publish site

on:
  push:
    branches: [main]
    paths:
      - "data/**"
      - ".claude/skills/random-learning/templates/**"
      - ".claude/skills/random-learning/scripts/**"
      - ".claude/skills/random-learning/assets/**"
      - "requirements.txt"
      - ".github/workflows/publish-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Reports the correct base path for the Pages config: "" for the rl.fz.ax
      # custom domain (served at root), "/rl" for a bare project page. No manual BASE_URL.
      - id: pages
        uses: actions/configure-pages@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Build site from data/
        run: |
          python .claude/skills/random-learning/scripts/build_site.py \
            --data-dir data --out-dir site --base-url "${{ steps.pages.outputs.base_path }}"
          # Preserve the custom domain across Actions deploys (Pages can otherwise drop it).
          echo "rl.fz.ax" > site/CNAME
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
