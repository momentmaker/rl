name: Liveness heartbeat

# Out-of-band liveness check (R21): alert if the pipeline has produced no new
# dated entry for STALE_DAYS. Runs in the cloud, independent of the Mac Mini,
# so a silent failure there still surfaces. Scheduled trigger only — no
# untrusted event input is used in any run: step.

on:
  schedule:
    - cron: "0 17 * * *" # daily ~17:00 UTC
  workflow_dispatch:

env:
  STALE_DAYS: "2"

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute freshness
        id: fresh
        run: |
          set -euo pipefail
          latest="$(find data -mindepth 3 -maxdepth 3 -type d 2>/dev/null | sort | tail -1 || true)"
          if [ -z "$latest" ]; then
            echo "stale=true" >> "$GITHUB_OUTPUT"
            echo "detail=no dated entries exist under data/ yet" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          entry_date="$(echo "$latest" | sed -E 's#.*data/([0-9]{4})/([0-9]{2})/([0-9]{2}).*#\1-\2-\3#')"
          entry_epoch="$(date -d "$entry_date" +%s)"
          now_epoch="$(date +%s)"
          age_days=$(( (now_epoch - entry_epoch) / 86400 ))
          echo "entry_date=$entry_date" >> "$GITHUB_OUTPUT"
          echo "age_days=$age_days" >> "$GITHUB_OUTPUT"
          if [ "$age_days" -gt "${STALE_DAYS}" ]; then
            echo "stale=true" >> "$GITHUB_OUTPUT"
          else
            echo "stale=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Alert if stale
        if: steps.fresh.outputs.stale == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENTRY_DATE: ${{ steps.fresh.outputs.entry_date }}
          AGE_DAYS: ${{ steps.fresh.outputs.age_days }}
          DETAIL: ${{ steps.fresh.outputs.detail }}
          TITLE: "Random Learning pipeline appears stale"
        run: |
          set -euo pipefail
          body="The daily pipeline has not produced a fresh dated entry."
          if [ -n "${DETAIL:-}" ]; then
            body="$body ${DETAIL}."
          else
            body="$body Newest entry: ${ENTRY_DATE} (${AGE_DAYS} days old, threshold ${STALE_DAYS})."
          fi
          existing="$(gh issue list --state open --search "$TITLE in:title" --json number --jq '.[0].number' || true)"
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create --title "$TITLE" --body "$body"
          fi
