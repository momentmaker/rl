name: Liveness heartbeat

# Out-of-band liveness check (R21): alert if the pipeline has produced no new
# dated entry for STALE_DAYS. Runs in the cloud, independent of the Mac Mini,
# so a silent failure there still surfaces. Scheduled trigger only — no
# untrusted event input is used in any run: step.

on:
  schedule:
    - cron: "0 17 * * *" # daily ~17:00 UTC
  workflow_dispatch:

env:
  STALE_DAYS: "2"

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Compute freshness
        id: fresh
        run: |
          set -uo pipefail
          # Only numeric YYYY/MM/DD dirs count — a stray/typo'd dir must not become "newest".
          latest="$(find data -mindepth 3 -maxdepth 3 -type d \
            -regex '.*/[0-9][0-9][0-9][0-9]/[0-9][0-9]/[0-9][0-9]' 2>/dev/null | sort | tail -1 || true)"
          if [ -z "$latest" ]; then
            echo "stale=true" >> "$GITHUB_OUTPUT"
            echo "detail=no dated entries under data/ yet" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          entry_date="$(echo "$latest" | sed -E 's#.*/([0-9]{4})/([0-9]{2})/([0-9]{2})$#\1-\2-\3#')"
          if ! [[ "$entry_date" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "stale=true" >> "$GITHUB_OUTPUT"
            echo "detail=newest data/ dir did not parse as YYYY/MM/DD" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          entry_epoch="$(date -d "$entry_date" +%s 2>/dev/null || echo 0)"
          now_epoch="$(date +%s)"
          age_days=$(( (now_epoch - entry_epoch) / 86400 ))
          echo "entry_date=$entry_date" >> "$GITHUB_OUTPUT"
          echo "age_days=$age_days" >> "$GITHUB_OUTPUT"
          # Unparseable, future-dated (clock skew/typo), or older than threshold -> alert.
          if [ "$entry_epoch" -eq 0 ] || [ "$age_days" -lt 0 ] || [ "$age_days" -gt "${STALE_DAYS}" ]; then
            echo "stale=true" >> "$GITHUB_OUTPUT"
          else
            echo "stale=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Alert if stale
        if: steps.fresh.outputs.stale == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          ENTRY_DATE: ${{ steps.fresh.outputs.entry_date }}
          AGE_DAYS: ${{ steps.fresh.outputs.age_days }}
          DETAIL: ${{ steps.fresh.outputs.detail }}
          TITLE: "Random Learning pipeline appears stale"
        run: |
          set -uo pipefail
          if [ -n "${DETAIL:-}" ]; then
            body="${DETAIL}."
          else
            body="newest entry ${ENTRY_DATE} is ${AGE_DAYS} days old (threshold ${STALE_DAYS})."
          fi

          # Telegram alert ([rl]-prefixed), only if the bot secrets are configured.
          if [ -n "${TG_TOKEN:-}" ] && [ -n "${TG_CHAT:-}" ]; then
            curl -fsS -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TG_CHAT}" \
              --data-urlencode "text=[rl] pipeline stale — ${body}" >/dev/null \
              && echo "telegram alert sent" || echo "telegram alert failed (non-fatal)"
          else
            echo "TELEGRAM_* secrets not set; skipping Telegram alert"
          fi

          # Durable, deduped GitHub issue as a persistent record.
          existing="$(gh issue list --state open --search "$TITLE in:title" --json number --jq '.[0].number' || true)"
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create --title "$TITLE" --body "$body"
          fi
